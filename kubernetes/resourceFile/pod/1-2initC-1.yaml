apiVersion: v1
kind: Pod 
metadata: 
  name: init-c-1
  namespace: myns
  labels:
    app: initc
spec:
  containers:
  - name: myapp-containers
    image: docker.1ms.run/library/nginx:alpine
  initContainers:
  - name: init-myservice
    image: docker.1ms.run/amd64/busybox:latest
    command: ['sh','-c','until nslookup myservice.myns.svc.cluster.local; do echo waiting for myservice ; sleep 2 ; done ;']
  - name: init-mydb
    image: docker.1ms.run/amd64/busybox:latest
    command: ['sh','-c','until nslookup mydb.myns.svc.cluster.local; do echo waiting for mydb ; sleep 2 ; done ;']
  # - name: myapp-1
  #   image: docker.1ms.run/library/nginx:alpine

# 测试init-C 
# kubectl create svc clusterip myservice --tcp=80:80
# kubectl create svc clusterip mydb --tcp=80:80